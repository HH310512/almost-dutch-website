function WaterMeter({ pct }) {
  const level = Math.max(6, pct);
  return (
    <div className="relative w-full overflow-hidden rounded-2xl" style={{ background: C.sky, height: 116, border: `1px solid ${C.line}` }}>

          <div style={{ height: 1, background: C.line, flex: 1 }} />
          <span className="pr-2" style={{ color: "#8FA3C8", fontSize: 10 }}>{m}%</span>
        </div>
      ))}
      <div className="absolute left-0 right-0 bottom-0" style={{ height: `${level}%`, background: C.blue, transition: "height 1.2s cubic-bezier(.22,1,.36,1)" }}>
        <svg viewBox="0 0 120 8" preserveAspectRatio="none" className="absolute -top-2 left-0 w-full" style={{ height: 8 }}>
          <path d="M0 8 Q 15 0 30 5 T 60 5 T 90 5 T 120 5 L 120 8 Z" fill={C.blue} />
        </svg>
      </div>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 34, color: pct > 55 ? "#fff" : C.ink, lineHeight: 1 }}>
          {pct}%

        <div style={{ fontSize: 12, letterSpacing: 1.5, textTransform: "uppercase", color: pct > 40 ? "#fff" : "#5B6B92", fontWeight: 600, marginTop: 4 }}>
          Dutch
        </div>
      </div>
    </div>
  );
}

// ---------- App ----------
function App() {
  const [screen, setScreen] = useState("welcome");
  const [worldId, setWorldId] = useState(null);
  const [qIndex, setQIndex] = useState(0);
  const [picked, setPicked] = useState(null);
  const [results, setResults] = useState({});
  const [toast, setToast] = useState("");

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(""), 2200);
    return () => clearTimeout(t);
  }, [toast]);

  const world = WORLDS.find((w) => w.id === worldId);
  const correctCount = Object.values(results).flat().filter(Boolean).length;
  const answeredCount = Object.values(results).flat().length;
  const pct = Math.min(100, Math.round(8 + (correctCount / TOTAL_Q) * 92));

  const startWorld = (id) => {
    setWorldId(id);
    setQIndex(0);
    setPicked(null);
    setResults((r) => ({ ...r, [id]: [] }));
    setScreen("play");
  };

  const choose = (i) => {
    if (picked !== null) return;
    setPicked(i);
    const ok = world.scenarios[qIndex].options[i].ok;
    setResults((r) => ({ ...r, [worldId]: [...(r[worldId] || []), ok] }));
  };

  const next = () => {
    const n = qIndex + 1;
    if (n < world.scenarios.length) {
      if (n % 5 === 0) {
        setScreen("fact");
      } else {
        setQIndex(n);
        setPicked(null);
      }
      window.scrollTo({ top: 0 });
    } else {
      setScreen("done");
      window.scrollTo({ top: 0 });
    }
  };

  const continueFromFact = () => {
    setQIndex(qIndex + 1);
    setPicked(null);
    setScreen("play");
    window.scrollTo({ top: 0 });
  };

  const share = async () => {
    const text = `I'm officially ${pct}% Dutch 🧀 — tested by Almost Dutch 🇳🇱 I now bring my own birthday cake.`;
    try {
      if (navigator.share) {
        await navigator.share({ text });
        return;
      }
      await navigator.clipboard.writeText(text);
      setToast("Copied — paste it anywhere!");
    } catch {
      setToast(text);
    }
  };

  return (
    <div className="min-h-screen w-full" style={{ background: C.bg, color: C.ink, fontFamily: "'Schibsted Grotesk', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Schibsted+Grotesk:wght@400;500;700&display=swap');
        button { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn .35s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        @media (prefers-reduced-motion: reduce) { .fade-in { animation: none; } * { transition: none !important; } }
      `}</style>

      <div className="mx-auto max-w-md px-5 pb-10 pt-6">
        {/* ---------- WELCOME ---------- */}
        {screen === "welcome" && (
          <div className="fade-in flex min-h-screen flex-col justify-center pb-16">
            {/* logo mark: het golf-icoon (W3b) */}
            <div className="mx-auto mb-6 overflow-hidden rounded-3xl" style={{ width: 88, height: 88, boxShadow: "0 6px 18px rgba(20,32,62,.15)" }}>
              <svg viewBox="0 0 96 96" style={{ width: "100%", height: "100%", display: "block" }}>
                <rect width="96" height="96" fill={C.orange} />
                <path d="M-8 54 Q 20 44 48 50 T 104 46 L 104 104 L -8 104 Z" fill={C.blue} />
                <path d="M-8 54 Q 20 44 48 50 T 104 46" stroke="#FAFBFD" strokeWidth="12" fill="none" />

            <div className="mb-1 flex items-center gap-2">
              <span style={{ fontSize: 22 }}>🇳🇱</span>
              <span style={{ fontSize: 12, letterSpacing: 2, fontWeight: 700, color: C.blue, textTransform: "uppercase" }}>Almost Dutch</span>
            </div>
            <h1 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 30, lineHeight: 1.1, marginBottom: 4 }}>
              How Dutch are you, really?
            </h1>
            <p style={{ color: "#5B6B92", fontSize: 15, marginBottom: 20 }}>
              Survive 45 real scenarios. Learn the unwritten rules. Nobody will warn you about the birthday circle — except us.
            </p>

            <WaterMeter pct={pct} />
            <p className="mt-2 text-center" style={{ fontSize: 12, color: "#8FA3C8" }}>
              {answeredCount === 0 ? "You start at 8% — that's for showing up. Very Dutch of you." : `${correctCount} of ${TOTAL_Q} scenarios survived`}
            </p>

            <div className="mt-6 flex flex-col gap-3">
              {WORLDS.map((w) => {
                const done = (results[w.id] || []).length >= w.scenarios.length;
                const score = (results[w.id] || []).filter(Boolean).length;
                return (
                  <button
                    key={w.id}
                    onClick={() => startWorld(w.id)}
                    className="flex w-full items-center gap-4 rounded-2xl p-4 text-left"
                    style={{ background: "#fff", border: `1px solid ${done ? C.blue : C.line}` }}
                  >
                    <div className="flex h-12 w-12 items-center justify-center rounded-xl" style={{ background: C.sky, fontSize: 24 }}>{w.emoji}</div>
                    <div className="flex-1">
                      <div style={{ fontWeight: 700, fontSize: 16 }}>{w.title}</div>
                      <div style={{ fontSize: 13, color: "#5B6B92" }}>{w.tagline} · {w.scenarios.length} scenarios</div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: done ? C.blue : "#8FA3C8" }}>
                      {done ? `${score}/${w.scenarios.length} ✓` : "Play"}
                    </div>
                  </button>
                );
              })}

              {LOCKED.map((w) => (
                <div key={w.title} className="flex w-full items-center gap-4 rounded-2xl p-4" style={{ border: `1px dashed ${C.line}`, opacity: 0.7 }}>
                  <div className="flex h-12 w-12 items-center justify-center rounded-xl" style={{ background: C.sky, fontSize: 24 }}>{w.emoji}</div>
                  <div className="flex-1">
                    <div style={{ fontWeight: 700, fontSize: 16, color: "#5B6B92" }}>{w.title}</div>
                    <div style={{ fontSize: 13, color: "#8FA3C8" }}>Coming in Premium</div>
                  </div>
                  <span style={{ fontSize: 16 }}>🔒</span>
                </div>
              ))}
            </div>

            {answeredCount > 0 && (
              <button onClick={share} className="mt-6 w-full rounded-2xl py-4 text-center" style={{ background: C.orange, color: "#fff", fontWeight: 700, fontSize: 16 }}>
                Share my {pct}% 🧀
              </button>
            )}
          </div>
        )}

        {/* ---------- PLAY ---------- */}
        {screen === "play" && world && (
          <div className="fade-in" key={qIndex}>
            <div className="mb-5 flex items-center justify-between">
              <button onClick={() => setScreen("home")} style={{ color: C.blue, fontWeight: 600, fontSize: 14 }}>← Worlds</button>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#8FA3C8" }}>
                {world.emoji} {qIndex + 1} / {world.scenarios.length}
              </span>
            </div>

            <div className="mb-5 flex gap-1">
              {world.scenarios.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full" style={{ background: i < qIndex ? C.blue : i === qIndex ? C.orange : C.line }} />
              ))}
            </div>

            <h2 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 21, lineHeight: 1.25, marginBottom: 18 }}>
              {world.scenarios[qIndex].q}
            </h2>

            <div className="flex flex-col gap-3">
              {world.scenarios[qIndex].options.map((o, i) => {
                const isPicked = picked === i;
                const reveal = picked !== null;
                let border = C.line, bg = "#fff";
                if (reveal && o.ok) { border = C.green; bg = "#EFFAF4"; }
                else if (reveal && isPicked && !o.ok) { border = C.red; bg = "#FCF0F0"; }
                return (
                  <button
                    key={i}
                    onClick={() => choose(i)}
                    disabled={picked !== null}
                    className="w-full rounded-2xl p-4 text-left"
                    style={{ background: bg, border: `1.5px solid ${border}`, fontWeight: 500, fontSize: 15.5, opacity: reveal && !o.ok && !isPicked ? 0.5 : 1 }}
                  >
                    {o.t}
                    {reveal && (o.ok || isPicked) && (
                      <div className="mt-2" style={{ fontSize: 13.5, color: o.ok ? C.green : C.red, fontWeight: 400 }}>
                        {o.ok ? "✓ " : "✗ "}{o.r}
                      </div>
                    )}
                  </button>
                );
              })}
            </div>

            {picked !== null && (
              <div className="fade-in">
                <div className="mt-4 rounded-2xl p-4" style={{ background: C.sky, border: `1px solid ${C.line}` }}>
                  <div style={{ fontSize: 11, letterSpacing: 1.5, fontWeight: 700, color: C.blue, textTransform: "uppercase", marginBottom: 4 }}>Even serieus</div>
                  <div style={{ fontSize: 14, lineHeight: 1.5, color: "#3A4A70" }}>{world.scenarios[qIndex].real}</div>
                </div>
                <button onClick={next} className="mt-4 w-full rounded-2xl py-4" style={{ background: C.blue, color: "#fff", fontWeight: 700, fontSize: 16 }}>
                  {qIndex + 1 < world.scenarios.length ? "Next scenario →" : "Finish world 🏁"}
                </button>
              </div>
            )}
          </div>
        )}

        {/* ---------- FUN FACT ---------- */}
        {screen === "fact" && world && (() => {
          const fact = (FACTS[worldId] || [])[Math.floor((qIndex + 1) / 5) - 1] || FACTS.work[0];
          return (
            <div className="fade-in flex flex-col items-center pt-10 text-center">
              <div style={{ fontSize: 11, letterSpacing: 2, fontWeight: 700, color: C.orange, textTransform: "uppercase" }}>
                Wist je dat? · Did you know?
              </div>
              <div className="mt-6 w-full rounded-2xl px-6 py-8" style={{ background: C.blue }}>
                {fact.art && <div className="mb-2">{fact.art}</div>}
                <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 56, color: "#fff", lineHeight: 1 }}>
                  {fact.stat}
                </div>
                <div className="mt-4" style={{ fontSize: 15, lineHeight: 1.55, color: "#DCE4F9" }}>
                  {fact.text}
                </div>
              </div>
              <p className="mt-3" style={{ fontSize: 12, color: "#8FA3C8" }}>
                A little break. Very un-Dutch of us — it's not even in the agenda.
              </p>
              <button onClick={continueFromFact} className="mt-6 w-full rounded-2xl py-4" style={{ background: C.blue, color: "#fff", fontWeight: 700, fontSize: 16 }}>
                Continue →
              </button>
            </div>
          );
        })()}

        {/* ---------- WORLD DONE ---------- */}
        {screen === "done" && world && (
          <div className="fade-in flex flex-col items-center pt-8 text-center">
            <div className="flex h-20 w-20 items-center justify-center rounded-full" style={{ background: C.sky, fontSize: 40 }}>{world.emoji}</div>
            <h2 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 26, marginTop: 16 }}>
              World survived!
            </h2>
            <p style={{ color: "#5B6B92", fontSize: 15, marginTop: 6 }}>
              {(results[worldId] || []).filter(Boolean).length} of {world.scenarios.length} correct in {world.title}.
            </p>
            <div className="mt-6 w-full">
              <WaterMeter pct={pct} />
              <p className="mt-2" style={{ fontSize: 13, color: "#8FA3C8" }}>Your Dutchness is rising. The dike is holding. For now.</p>
            </div>
            <button onClick={share} className="mt-6 w-full rounded-2xl py-4" style={{ background: C.orange, color: "#fff", fontWeight: 700, fontSize: 16 }}>
              Share my {pct}% 🧀
            </button>
            <button onClick={() => setScreen("home")} className="mt-3 w-full rounded-2xl py-4" style={{ background: "#fff", border: `1.5px solid ${C.line}`, color: C.ink, fontWeight: 700, fontSize: 16 }}>
              Back to worlds
            </button>
          </div>
        )}
      </div>

      {toast && (
        <div className="fixed bottom-6 left-1/2 z-50 -translate-x-1/2 rounded-full px-5 py-3 text-center" style={{ background: C.ink, color: "#fff", fontSize: 13, maxWidth: "88%" }}>
          {toast}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
